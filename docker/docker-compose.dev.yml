version: '3.8'

services:
  backend-dev:
    image: localhost:5000/agent-task-system:v5.5
    container_name: agent-task-backend-dev
    restart: unless-stopped
    ports:
      - "3002:3000"
    volumes:
      - ../backend:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      PORT: 3000
      API_PREFIX: api/v1
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: admin
      DB_PASSWORD: admin123
      DB_DATABASE: agent_task
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev-secret-key
      JWT_EXPIRATION: 7d
    networks:
      - agent-task-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend-dev:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: agent-task-frontend-dev
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_BASE_URL=/api/v1
    networks:
      - agent-task-network
    depends_on:
      backend-dev:
        condition: service_healthy

  nginx-dev:
    image: nginx:alpine
    container_name: agent-task-nginx-dev
    restart: unless-stopped
    ports:
      - "3100:80"
    volumes:
      - ../frontend/dist:/usr/share/nginx/html
      - ./nginx.dev.conf:/etc/nginx/nginx.conf:ro
    networks:
      - agent-task-network
    depends_on:
      - backend-dev
      - frontend-dev

  postgres:
    image: postgres:15-alpine
    container_name: agent-task-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: agent_task
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agent-task-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agent-task-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - agent-task-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: agent-task-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - agent-task-network
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:

networks:
  agent-task-network:
    driver: bridge
