version: '3.8'

services:
  backend-prod:
    image: localhost:5000/agent-task-system:v5.5
    container_name: agent-task-backend-prod
    restart: unless-stopped
    # 不对外暴露端口，只在内网访问
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: api/v1
      CORS_ORIGIN: http://localhost:5173,http://localhost:5100
      DB_HOST: postgres-prod
      DB_PORT: 5432
      DB_USERNAME: admin
      DB_PASSWORD: admin123
      DB_DATABASE: agent_task_prod
      REDIS_HOST: redis-prod
      REDIS_PORT: 6379
      JWT_SECRET: prod-secret-key
      JWT_EXPIRATION: 7d
    networks:
      - prod-network
    depends_on:
      postgres-prod:
        condition: service_healthy
      redis-prod:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend-prod:
    image: localhost:5000/agent-task-frontend:v5.5
    container_name: agent-task-frontend-prod
    restart: unless-stopped
    # 不对外暴露端口，只在内网访问
    expose:
      - "80"
    volumes:
      - ./frontend-prod-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      PORT: 80
      BACKEND_HOST: backend-prod
    networks:
      - prod-network
    depends_on:
      backend-prod:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx-prod:
    image: nginx:alpine
    container_name: agent-task-nginx-prod
    restart: unless-stopped
    ports:
      - "5100:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - prod-network
    depends_on:
      - backend-prod
      - frontend-prod
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres-prod:
    image: postgres:15-alpine
    container_name: agent-task-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: agent_task_prod
    ports:
      - "5435:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - prod-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-prod:
    image: redis:7-alpine
    container_name: agent-task-redis-prod
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data
    networks:
      - prod-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_prod_data:
  redis_prod_data:

networks:
  prod-network:
